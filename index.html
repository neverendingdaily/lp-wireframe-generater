<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP ワイヤーフレーム自動生成ツール</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* ─ ベースカラー ─ */
    --bg-root:     #F4F6F9;   /* 全体背景：ごく薄いブルーグレー */
    --bg-surface:  #FFFFFF;   /* カード・パネル：純白 */
    --bg-subtle:   #F8F9FB;   /* 入力欄・インナー */
    --bg-hover:    #F0F3F8;

    /* ─ ボーダー ─ */
    --border:      #E4E9F0;
    --border-focus:#B8C8E8;

    /* ─ テキスト ─ */
    --text-primary:#2C3E50;
    --text-muted:  #6B7A99;
    --text-dim:    #A8B4C8;

    /* ─ アクセント（インディゴ1色） ─ */
    --accent:      #4F6EF7;
    --accent-dark: #3A56E0;
    --accent-light:#EEF1FF;
    --accent-mid:  #C7D0FC;

    /* ─ シャドウ ─ */
    --shadow-sm: 0 1px 3px rgba(30,50,100,0.06), 0 2px 8px rgba(30,50,100,0.04);
    --shadow-md: 0 2px 8px rgba(30,50,100,0.07), 0 8px 24px rgba(30,50,100,0.07);
    --shadow-lg: 0 4px 16px rgba(30,50,100,0.08), 0 20px 48px rgba(30,50,100,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg-root);
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ══ HEADER ══════════════════════════ */
  .header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-sm);
    position: relative; z-index: 10;
  }
  .logo-wrap { display: flex; align-items: center; gap: 11px; }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #4F6EF7, #7C91FF);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
    box-shadow: 0 2px 8px rgba(79,110,247,0.28);
  }
  .logo-text {
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 16px; color: var(--text-primary); letter-spacing: -0.3px;
  }
  .logo-text em { font-style: normal; color: var(--accent); }
  .header-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-light); border: 1px solid var(--accent-mid);
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; color: var(--accent);
    font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
  }
  .kbd-hint {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-dim); font-family: 'Inter', sans-serif;
  }
  .kbd {
    background: var(--bg-subtle); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 6px; font-size: 10px;
    color: var(--text-muted); box-shadow: 0 1px 0 var(--border);
    font-family: 'Space Mono', monospace;
  }

  /* ══ LAYOUT ══════════════════════════ */
  .main-layout {
    display: grid;
    grid-template-columns: 400px 1fr;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* ══ LEFT PANEL ══════════════════════ */
  .left-panel {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 2px 0 10px rgba(30,50,100,0.04);
  }
  .panel-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.8px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .p-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }

  .input-area {
    flex: 1; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
  }
  .input-area::-webkit-scrollbar { width: 4px; }
  .input-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Field label */
  .f-label {
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 7px;
  }
  .f-label i { color: var(--accent); font-size: 10px; }

  /* API key row */
  .api-key-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    box-shadow: var(--shadow-sm);
    transition: border-color .2s, box-shadow .2s;
  }
  .api-key-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.09), var(--shadow-sm);
  }
  .api-key-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary); font-size: 13px;
    font-family: 'Space Mono', monospace;
  }
  .api-key-input::placeholder { color: var(--text-dim); }
  .eye-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 13px; padding: 2px;
    transition: color .2s;
  }
  .eye-btn:hover { color: var(--text-muted); }

  /* Textarea */
  .textarea-wrap { flex: 1; position: relative; }
  .main-textarea {
    width: 100%; height: 100%; min-height: 240px;
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    color: var(--text-primary); font-size: 13px; line-height: 1.78;
    resize: none; outline: none;
    font-family: 'Noto Sans JP', sans-serif;
    box-shadow: var(--shadow-sm);
    transition: border-color .2s, box-shadow .2s;
  }
  .main-textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.09), var(--shadow-sm);
  }
  .main-textarea::placeholder { color: var(--text-dim); }
  .char-count {
    position: absolute; bottom: 10px; right: 14px;
    font-size: 10px; color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  /* Error */
  .error-box {
    background: #FFF5F5; border: 1px solid #FECACA;
    border-radius: 10px; padding: 12px 16px; font-size: 12px;
    color: #C53030; display: flex; gap: 10px; align-items: flex-start;
    box-shadow: var(--shadow-sm);
  }
  .error-box i { flex-shrink: 0; margin-top: 1px; }

  /* Section tags */
  .stags-wrap { display: flex; flex-direction: column; gap: 8px; }
  .stags-lbl {
    font-size: 11px; color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 5px;
  }
  .stags-lbl i { color: #34D399; font-size: 10px; }
  .stags { display: flex; flex-wrap: wrap; gap: 6px; }
  .stag {
    font-size: 11px; padding: 3px 11px; border-radius: 20px;
    font-family: 'Inter', sans-serif; font-weight: 600;
    border: 1px solid;
  }
  .s-hero      { border-color:#FCD34D; color:#92400E; background:#FFFBEB; }
  .s-problem   { border-color:#FCA5A5; color:#991B1B; background:#FEF2F2; }
  .s-solution  { border-color:#6EE7B7; color:#065F46; background:#ECFDF5; }
  .s-benefits  { border-color:#93C5FD; color:#1E40AF; background:#EFF6FF; }
  .s-cta       { border-color:#C4B5FD; color:#5B21B6; background:#F5F3FF; }

  /* Generate button */
  .gen-btn {
    width: 100%; padding: 13px 20px;
    border-radius: 11px; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 14px; color: #fff;
    background: var(--accent);
    box-shadow: 0 2px 8px rgba(79,110,247,0.28), 0 4px 20px rgba(79,110,247,0.14);
    transition: background .2s, box-shadow .2s, transform .15s;
  }
  .gen-btn:hover {
    background: var(--accent-dark);
    box-shadow: 0 4px 12px rgba(79,110,247,0.38), 0 8px 28px rgba(79,110,247,0.18);
    transform: translateY(-1px);
  }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin .75s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ RIGHT PANEL ═════════════════════ */
  .right-panel {
    display: flex; flex-direction: column;
    background: var(--bg-root); overflow: hidden;
  }
  .preview-toolbar {
    background: var(--bg-surface); border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; box-shadow: var(--shadow-sm);
  }
  .toolbar-left { display: flex; align-items: center; gap: 14px; }
  .view-toggle {
    display: flex; background: var(--bg-subtle);
    border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px;
    box-shadow: inset 0 1px 3px rgba(30,50,100,0.05);
  }
  .toggle-btn {
    padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
    transition: all .2s; color: var(--text-muted); background: transparent;
    display: flex; align-items: center; gap: 6px;
  }
  .toggle-btn.active {
    background: var(--bg-surface); color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .toggle-btn i { font-size: 11px; }
  .view-lbl { font-size: 11px; color: var(--text-dim); font-family: 'Space Mono', monospace; }

  .toolbar-right { display: flex; align-items: center; gap: 10px; }
  .copy-btn {
    display: none; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-surface);
    cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--text-muted); font-family: 'Inter', sans-serif;
    box-shadow: var(--shadow-sm); transition: all .2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .live-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-dim); font-family: 'Inter', sans-serif;
  }
  .live-tag i { color: #34D399; font-size: 8px; }

  /* Preview */
  .preview-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 36px 28px;
    display: flex; justify-content: center; align-items: flex-start;
    position: relative;
  }
  .preview-scroll::-webkit-scrollbar { width: 5px; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LP Frame */
  .lp-frame {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(30,50,100,0.04);
    transition: all .4s cubic-bezier(.4,0,.2,1);
    width: 100%; max-width: 960px; min-height: 400px;
  }
  .lp-frame.mobile { width: 375px; }

  /* ─ LP Output Sections ─ */
  .lp-hero {
    background: #F8F9FA; /* ごく薄いグレーに変更 */
    color: #333333; /* ダークグレーに変更 */
    padding: 72px 48px;
    text-align: center; position: relative; overflow: hidden;
  }
  .lp-frame.mobile .lp-hero { padding: 50px 24px; }
  .lp-hero::before { display: none; } /* ダークモード用の光の演出を削除 */
  
  .hero-badge {
    display: inline-block; padding: 5px 16px; border-radius: 20px;
    border: 1px solid rgba(79,110,247,0.3); /* アクセントカラーの枠線 */
    font-size: 11px;
    margin-bottom: 20px; letter-spacing: 1.5px; color: #4F6EF7; /* アクセントカラーの文字 */
    font-family: 'Space Mono', monospace;
    background: #EEF1FF; /* ごく薄い青背景 */
  }
  .hero-catch {
    font-size: clamp(22px, 3.5vw, 38px); font-weight: 900;
    line-height: 1.3; margin-bottom: 20px; font-family: 'Inter', sans-serif;
    color: #1A202C; /* 濃いダークグレーに変更（グラデーション解除） */
  }
  .lp-frame.mobile .hero-catch { font-size: 22px; }
  .hero-sub {
    font-size: 15px; color: #6B7A99; /* 柔らかいグレーに変更 */
    max-width: 560px; margin: 0 auto 32px; line-height: 1.78;
  }
  .lp-frame.mobile .hero-sub { font-size: 13px; }
  .hero-cta {
    display: inline-block; padding: 15px 46px;
    background: linear-gradient(135deg, #4F6EF7, #7C91FF);
    color: #fff; font-weight: 800; font-size: 15px;
    border-radius: 50px; font-family: 'Inter', sans-serif;
    box-shadow: 0 4px 16px rgba(79,110,247,0.3); /* 影を少し柔らかく調整 */
  }
  .lp-frame.mobile .hero-cta { font-size: 14px; padding: 13px 30px; }
  .hero-hint {
    margin-top: 40px; font-size: 11px; color: #A8B4C8; /* 薄いグレーに変更 */
    font-family: 'Space Mono', monospace; letter-spacing: 1px;
  }

  .lp-problem { background: #FAFBFC; padding: 64px 48px; border-bottom: 1px solid #EDEEF2; }
  .lp-frame.mobile .lp-problem { padding: 48px 22px; }
  .lp-sec-label {
    font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 700;
    letter-spacing: 2px; color: #A0AEC0; text-transform: uppercase; margin-bottom: 10px;
  }
  .lp-sec-title {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: clamp(18px, 2.2vw, 24px); color: #1A202C;
    margin-bottom: 32px; line-height: 1.42;
  }
  .lp-frame.mobile .lp-sec-title { font-size: 20px; }
  .prob-list { display: flex; flex-direction: column; gap: 12px; }
  .prob-item {
    display: flex; align-items: flex-start; gap: 14px;
    background: #fff; border-radius: 12px; padding: 16px 20px;
    border: 1px solid #EDEEF2;
    box-shadow: 0 1px 4px rgba(30,50,100,0.05), 0 4px 12px rgba(30,50,100,0.04);
  }
  .prob-icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: #FFF5F5; border: 1px solid #FED7D7;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #E53E3E; font-size: 13px;
  }
  .prob-text { font-size: 14px; color: #2D3748; line-height: 1.55; padding-top: 7px; }

  .lp-solution {
    background: #FFFFFF; /* 純白に変更 */
    color: #333333;
    padding: 72px 48px; text-align: center;
    border-bottom: 1px solid #EDEEF2; /* 区切り線を追加 */
  }
  .lp-frame.mobile .lp-solution { padding: 50px 22px; }
  .sol-label { color: #4F6EF7; font-weight: 700; font-size: 12px; letter-spacing: 1px; }
  .sol-title {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: clamp(20px, 2.5vw, 28px); color: #1A202C; /* 濃いグレーに変更 */
    margin-bottom: 20px; margin-top: 8px;
  }
  .lp-frame.mobile .sol-title { font-size: 22px; }
  .sol-divider {
    width: 48px; height: 3px; margin: 24px auto;
    background: linear-gradient(90deg, #4F6EF7, #7C91FF); border-radius: 2px;
  }
  .sol-desc {
    font-size: 15px; color: #6B7A99; /* 柔らかいグレーに変更 */
    max-width: 660px; margin: 0 auto; line-height: 1.85;
  }
  .lp-frame.mobile .sol-desc { font-size: 13px; }

  .lp-benefits { background: #fff; padding: 72px 48px; }
  .lp-frame.mobile .lp-benefits { padding: 50px 22px; }
  .ben-title {
    font-family: 'Inter', sans-serif; font-weight: 800;
    font-size: clamp(18px, 2.2vw, 24px); color: #1A202C;
    margin-bottom: 40px; text-align: center;
  }
  .lp-frame.mobile .ben-title { font-size: 20px; margin-bottom: 28px; }
  .ben-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .lp-frame.mobile .ben-grid { grid-template-columns: 1fr; gap: 14px; }
  .ben-card {
    background: #F8FAFF; border-radius: 14px; padding: 28px 22px;
    border: 1px solid #E8EDFF; text-align: center;
    box-shadow: 0 1px 4px rgba(79,110,247,0.06), 0 4px 16px rgba(79,110,247,0.05);
  }
  .ben-num {
    font-family: 'Inter', sans-serif; font-weight: 800; font-size: 34px;
    background: linear-gradient(135deg, #4F6EF7, #7C91FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .ben-card-title {
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 15px; color: #1A202C; margin-bottom: 10px;
  }
  .ben-card-desc { font-size: 13px; color: #718096; line-height: 1.65; }

  .lp-cta {
    background: #F8F9FA; /* ごく薄いグレーに変更 */
    padding: 80px 48px; text-align: center; position: relative; overflow: hidden;
  }
  .lp-frame.mobile .lp-cta { padding: 56px 24px; }
  .lp-cta::before { display: none; } /* ダークモード用の光の演出を削除 */
  
  .cta-micro {
    font-size: 13px; color: #6B7A99; /* 柔らかいグレーに変更 */
    font-family: 'Inter', sans-serif; margin-bottom: 24px; font-weight: 600;
  }
  .cta-btn-final {
    display: inline-block; padding: 18px 56px;
    background: linear-gradient(135deg, #F6AD55, #ED8936);
    color: #fff; font-weight: 800; font-size: 18px;
    border-radius: 50px; font-family: 'Inter', sans-serif;
    box-shadow: 0 6px 20px rgba(246,173,85,0.3); /* 影を柔らかく */
    position: relative; z-index: 1;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cta-btn-final:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(246,173,85,0.4);
  }
  .lp-frame.mobile .cta-btn-final { font-size: 15px; padding: 15px 36px; }
  .cta-safety {
    margin-top: 20px; font-size: 11px; color: #A8B4C8; /* 薄いグレーに変更 */
    font-family: 'Inter', sans-serif;
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; padding: 48px; text-align: center;
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: var(--bg-surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    box-shadow: var(--shadow-md);
  }
  .empty-title {
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 17px; color: var(--text-muted);
  }
  .empty-sub { font-size: 13px; color: var(--text-dim); max-width: 280px; line-height: 1.65; }
  .skel-wrap { display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px;margin-top:8px; }
  .skel { height:10px;background:var(--bg-surface);border-radius:5px;border:1px solid var(--border); }

  /* Loading */
  .loading-overlay {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(244,246,249,0.84);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    backdrop-filter: blur(6px);
  }
  .loading-ring {
    width: 52px; height: 52px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--accent);
    animation: spin .9s linear infinite;
  }
  .loading-lbl { font-size:13px;font-weight:600;color:var(--text-muted);font-family:'Inter',sans-serif; }
  .loading-sub { font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace;margin-top:-8px; }
  .ldots::after { content:'';animation:dots 1.4s steps(4,end) infinite; }
  @keyframes dots { 0%,100%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  /* Animations */
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .ai { animation: fadeUp .45s ease-out forwards; }
  .d1 { animation-delay:.06s;opacity:0; }
  .d2 { animation-delay:.13s;opacity:0; }
  .d3 { animation-delay:.20s;opacity:0; }
  .d4 { animation-delay:.28s;opacity:0; }
</style>
</head>

<body>

<header class="header">
  <div class="logo-wrap">
    <div class="logo-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
    <span class="logo-text">LP<em>Frame</em> AI</span>
    <div class="header-badge">
      <i class="fa-solid fa-circle-check" style="font-size:10px;"></i>Gemini Powered
    </div>
  </div>
  <div class="kbd-hint">
    <span class="kbd">Ctrl</span><span>+</span><span class="kbd">↵</span>
    <span style="margin-left:4px;">で生成</span>
  </div>
</header>

<div class="main-layout">

  <aside class="left-panel">
    <div class="panel-header">
      <div class="panel-title"><div class="p-dot"></div>入力ソース</div>
    </div>
    <div class="input-area">

      <div>
        <div class="f-label"><i class="fa-solid fa-key"></i>Gemini API キー</div>
        <div style="display:flex; gap:8px;">
          <div class="api-key-row" style="flex:1;">
            <input type="password" class="api-key-input" id="apiKey" placeholder="AIza...">
            <button class="eye-btn" onclick="toggleKey()">
              <i class="fa-regular fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <button id="save-ak-btn" style="width: 42px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-surface); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm);" title="APIキーを保存">💾</button>
        </div>
      </div>

      <div style="flex:1;display:flex;flex-direction:column;min-height:240px;">
        <div class="f-label"><i class="fa-regular fa-file-lines"></i>アフィリエイトテキスト</div>
        <div class="textarea-wrap" style="flex:1;">
          <textarea class="main-textarea" id="articleText"
            placeholder="記事テキストをここに貼り付けてください...

例：
・商品の特徴・メリット
・ターゲットの悩みや課題
・解決策としての商品説明
・お客様の声・実績
・価格・キャンペーン情報

Gemini AI がセクション分割し、
売れる LP を自動生成します。"
            oninput="updateChar(this)"></textarea>
          <span class="char-count" id="charCount">0 文字</span>
        </div>
      </div>

      <div class="error-box" id="errorBox" style="display:none;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorMsg"></span>
      </div>

      <div class="stags-wrap" id="stagWrap" style="display:none;">
        <div class="stags-lbl"><i class="fa-solid fa-circle-check"></i>生成済みセクション</div>
        <div class="stags">
          <span class="stag s-hero">HERO</span>
          <span class="stag s-problem">PROBLEM</span>
          <span class="stag s-solution">SOLUTION</span>
          <span class="stag s-benefits">BENEFITS</span>
          <span class="stag s-cta">CTA</span>
        </div>
      </div>

      <button class="gen-btn" id="genBtn" onclick="generateLP()">
        <i class="fa-solid fa-wand-magic-sparkles" style="margin-right:8px;"></i>
        LPワイヤーフレームを生成
      </button>

    </div>
  </aside>

  <section class="right-panel">
    <div class="preview-toolbar">
      <div class="toolbar-left">
        <div class="view-toggle">
          <button class="toggle-btn active" id="pcBtn" onclick="setView('pc')">
            <i class="fa-solid fa-display"></i>PC表示
          </button>
          <button class="toggle-btn" id="mobBtn" onclick="setView('mobile')">
            <i class="fa-solid fa-mobile-screen-button"></i>スマホ表示
          </button>
        </div>
        <span class="view-lbl" id="viewLbl">960px</span>
      </div>
      <div class="toolbar-right">
        <button class="copy-btn" id="copyBtn" onclick="copyHTML()">
          <i class="fa-regular fa-copy"></i>HTMLをコピー
        </button>
        <div class="live-tag"><i class="fa-solid fa-circle"></i>LIVE PREVIEW</div>
      </div>
    </div>

    <div class="preview-scroll" id="previewScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎨</div>
        <div class="empty-title">プレビューエリア</div>
        <div class="empty-sub">テキストを入力して「生成」ボタンを押すと、ここに LP が表示されます</div>
        <div class="skel-wrap">
          <div class="skel" style="opacity:.6;"></div>
          <div class="skel" style="opacity:.4;width:72%;"></div>
          <div class="skel" style="opacity:.25;width:52%;"></div>
        </div>
      </div>
      <div class="lp-frame" id="lpFrame" style="display:none;"></div>
    </div>
  </section>

</div>

<script>
// ===== APIキー保存・復元機能 =====
const saveAkBtn = document.getElementById('save-ak-btn');
const akEl = document.getElementById('apiKey');

window.addEventListener('DOMContentLoaded', function() {
  const savedKey = localStorage.getItem('savedGeminiApiKey');
  if (savedKey) {
    akEl.value = savedKey;
  }
});

if(saveAkBtn) {
  saveAkBtn.addEventListener('click', function() {
    const currentKey = akEl.value.trim();
    if (currentKey) {
      localStorage.setItem('savedGeminiApiKey', currentKey);
      const origText = saveAkBtn.textContent;
      saveAkBtn.textContent = '✓';
      saveAkBtn.style.color = '#059669';
      saveAkBtn.style.borderColor = '#34D399';
      setTimeout(function(){
        saveAkBtn.textContent = origText;
        saveAkBtn.style.color = '';
        saveAkBtn.style.borderColor = 'var(--border)';
      }, 2000);
    } else {
      localStorage.removeItem('savedGeminiApiKey');
      alert('APIキーの保存を解除しました');
    }
  });
}
// ================================

let currentView = 'pc';
let generatedData = null;

function updateChar(el) {
  document.getElementById('charCount').textContent = el.value.length.toLocaleString() + ' 文字';
}
function toggleKey() {
  const i = document.getElementById('apiKey');
  const ic = document.getElementById('eyeIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  ic.className = i.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
}
function setView(mode) {
  currentView = mode;
  const f = document.getElementById('lpFrame');
  const pb = document.getElementById('pcBtn');
  const mb = document.getElementById('mobBtn');
  if (mode === 'pc') {
    f.classList.remove('mobile');
    pb.classList.add('active'); mb.classList.remove('active');
    document.getElementById('viewLbl').textContent = '960px';
  } else {
    f.classList.add('mobile');
    mb.classList.add('active'); pb.classList.remove('active');
    document.getElementById('viewLbl').textContent = '375px';
  }
}
function showErr(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').style.display = 'flex';
  setTimeout(() => document.getElementById('errorBox').style.display = 'none', 8000);
}
function hideErr() { document.getElementById('errorBox').style.display = 'none'; }

function setLoading(on) {
  const btn = document.getElementById('genBtn');
  const scr = document.getElementById('previewScroll');
  const old = document.getElementById('loadOverlay');
  if (old) old.remove();
  if (on) {
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span><span style="margin-left:10px;">Gemini が分析中</span><span class="ldots"></span>`;
    const ov = document.createElement('div');
    ov.className = 'loading-overlay'; ov.id = 'loadOverlay';
    ov.innerHTML = `<div class="loading-ring"></div>
      <div class="loading-lbl">AI が LP を構造化中<span class="ldots"></span></div>
      <div class="loading-sub">gemini-2.5-flash</div>`;
    scr.appendChild(ov);
  } else {
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles" style="margin-right:8px;"></i>LPワイヤーフレームを生成`;
  }
}

async function generateLP() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const text   = document.getElementById('articleText').value.trim();
  if (!apiKey)             { showErr('Gemini API キーを入力してください。'); return; }
  if (text.length < 30)  { showErr('テキストを入力してください（30文字以上）。'); return; }
  hideErr(); setLoading(true);

  const sys = `あなたは凄腕のダイレクトレスポンスマーケターです。入力されたテキストを、コンバージョン率を最大化するLPのセクションに分割し、以下のJSONスキーマのみで出力してください。見出しやマイクロコピーは魅力的に補足・リライトしてください。出力はJSONのみ。コードブロックなし。余分なテキストなし。
{"hero":{"catchphrase":"キャッチコピー","sub_copy":"サブコピー","cta_text":"ボタンテキスト"},"problem":{"title":"悩みセクションタイトル","points":["悩み1","悩み2","悩み3"]},"solution":{"title":"解決策タイトル","description":"説明文"},"benefits":{"title":"メリットセクションタイトル","items":[{"title":"メリット1","desc":"説明"},{"title":"メリット2","desc":"説明"},{"title":"メリット3","desc":"説明"}]},"cta_bottom":{"microcopy":"マイクロコピー","button_text":"CTAボタンテキスト"}}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          system_instruction:{parts:[{text:sys}]},
          contents:[{parts:[{text}]}],
          generationConfig:{responseMimeType:'application/json',temperature:0.7}
        })
      }
    );
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    const result = await res.json();
    const raw = result.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!raw) throw new Error('Gemini からの応答が空です。');
    const data = JSON.parse(raw.replace(/```json|```/g,'').trim());
    generatedData = data;
    renderLP(data);
    document.getElementById('stagWrap').style.display = 'flex';
    document.getElementById('copyBtn').style.display  = 'inline-flex';
  } catch(err) {
    showErr('エラー: ' + err.message);
  } finally {
    setLoading(false);
  }
}

function renderLP(d) {
  const icons = ['fa-triangle-exclamation','fa-face-sad-tear','fa-clock'];
  const nums  = ['01','02','03'];

  const probs = (d.problem?.points||[]).map((p,i)=>`
    <div class="prob-item ai" style="animation-delay:${.05+i*.07}s;opacity:0;">
      <div class="prob-icon"><i class="fa-solid ${icons[i%3]}"></i></div>
      <div class="prob-text">${esc(p)}</div>
    </div>`).join('');

  const bens = (d.benefits?.items||[]).map((b,i)=>`
    <div class="ben-card ai" style="animation-delay:${.10+i*.08}s;opacity:0;">
      <div class="ben-num">${nums[i]||String(i+1).padStart(2,'0')}</div>
      <div class="ben-card-title">${esc(b.title)}</div>
      <div class="ben-card-desc">${esc(b.desc)}</div>
    </div>`).join('');

  document.getElementById('lpFrame').innerHTML = `
    <div class="lp-hero ai">
      <div class="hero-badge">✦ SPECIAL OFFER ✦</div>
      <h1 class="hero-catch">${esc(d.hero?.catchphrase||'')}</h1>
      <p class="hero-sub">${esc(d.hero?.sub_copy||'')}</p>
      <div class="hero-cta">${esc(d.hero?.cta_text||'今すぐチェック')}</div>
      <div class="hero-hint">▼ SCROLL DOWN ▼</div>
    </div>
    <div class="lp-problem ai d1">
      <div class="lp-sec-label">PROBLEM</div>
      <h2 class="lp-sec-title">${esc(d.problem?.title||'')}</h2>
      <div class="prob-list">${probs}</div>
    </div>
    <div class="lp-solution ai d2">
      <div class="lp-sec-label sol-label">SOLUTION</div>
      <h2 class="sol-title">${esc(d.solution?.title||'')}</h2>
      <div class="sol-divider"></div>
      <p class="sol-desc">${esc(d.solution?.description||'')}</p>
    </div>
    <div class="lp-benefits ai d3">
      <h2 class="ben-title">${esc(d.benefits?.title||'3つのメリット')}</h2>
      <div class="ben-grid">${bens}</div>
    </div>
    <div class="lp-cta ai d4">
      <p class="cta-micro">${esc(d.cta_bottom?.microcopy||'')}</p>
      <div class="cta-btn-final">${esc(d.cta_bottom?.button_text||'今すぐ申し込む')}</div>
      <div class="cta-safety"><i class="fa-solid fa-lock" style="margin-right:4px;opacity:.45;"></i>安心・安全・個人情報保護</div>
    </div>`;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('lpFrame').style.display    = 'block';
  if (currentView==='mobile') document.getElementById('lpFrame').classList.add('mobile');
  document.getElementById('previewScroll').scrollTop  = 0;
}

function copyHTML() {
  if (!generatedData) return;
  navigator.clipboard.writeText(document.getElementById('lpFrame').outerHTML).then(()=>{
    const btn = document.getElementById('copyBtn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-check"></i>コピーしました';
    btn.style.cssText += 'color:#059669;border-color:#6EE7B7;background:#ECFDF5;';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.color=''; btn.style.borderColor=''; btn.style.background=''; }, 2200);
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('apiKey').addEventListener('keydown', e=>{
  if (e.key==='Enter') document.getElementById('articleText').focus();
});
document.getElementById('articleText').addEventListener('keydown', e=>{
  if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') generateLP();
});
</script>
</body>
</html>
